<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolBridge AI — Intelligent Parent Engagement for K–12 Districts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0E2A4A;
    --blue: #1B4F8A;
    --blue-mid: #2A6DB5;
    --sky: #4A9FD4;
    --ice: #E8F3FB;
    --green: #1F7A52;
    --mint: #EAF5EE;
    --amber: #D97706;
    --cream: #FAFAF7;
    --white: #FFFFFF;
    --ink: #1A1A2E;
    --muted: #5C6B7A;
    --border: #D8E6F0;
    --r: 12px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: var(--ink);
    background: var(--cream);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 68px;
    background: rgba(14,42,74,0.97);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .nav-brand {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 1.25rem;
    color: var(--white); letter-spacing: -0.02em;
  }
  .nav-brand span { color: #7FC4F0; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color .2s; }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    background: var(--sky); color: var(--white);
    padding: 0.5rem 1.25rem; border-radius: 6px;
    text-decoration: none; font-size: 0.9rem; font-weight: 500;
    transition: background .2s;
  }
  .nav-cta:hover { background: #5EB3E8; }

  .hero {
    min-height: 100vh;
    background: var(--navy);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 120px 5% 80px;
    position: relative; overflow: hidden;
    text-align: center;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(42,109,181,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 50%, rgba(31,122,82,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(74,159,212,0.15); border: 1px solid rgba(74,159,212,0.3);
    color: #7FC4F0; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 6px 16px; border-radius: 100px; margin-bottom: 2rem;
    animation: fadeUp .6s ease both;
  }
  .hero-badge::before { content: ''; width: 6px; height: 6px; background: #7FC4F0; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: clamp(2.4rem, 5vw, 4rem);
    color: var(--white); line-height: 1.15; letter-spacing: -0.03em;
    max-width: 820px; margin: 0 auto 1.5rem;
    animation: fadeUp .7s .1s ease both;
  }
  h1 em { font-style: normal; color: #7FC4F0; }

  .hero-sub {
    font-size: clamp(1rem, 1.8vw, 1.2rem); color: rgba(255,255,255,0.65);
    max-width: 600px; margin: 0 auto 2.5rem;
    animation: fadeUp .7s .2s ease both;
  }

  .hero-actions {
    display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    animation: fadeUp .7s .3s ease both;
  }
  .btn-primary {
    background: var(--sky); color: var(--white);
    padding: 0.85rem 2rem; border-radius: 8px;
    font-size: 1rem; font-weight: 500; text-decoration: none;
    transition: transform .15s, background .2s;
    display: inline-block;
  }
  .btn-primary:hover { background: #5EB3E8; transform: translateY(-1px); }
  .btn-outline {
    border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.85);
    padding: 0.85rem 2rem; border-radius: 8px;
    font-size: 1rem; font-weight: 500; text-decoration: none;
    transition: background .2s, border-color .2s;
    display: inline-block;
  }
  .btn-outline:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.5); }

  .hero-stats {
    display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap;
    margin-top: 4rem; padding-top: 3rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    animation: fadeUp .7s .4s ease both;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem; font-weight: 600; color: var(--white);
    line-height: 1; display: block;
  }
  .stat-num em { font-style: normal; color: #7FC4F0; }
  .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 4px; display: block; }

  section { padding: 5rem 5%; }
  .container { max-width: 1080px; margin: 0 auto; }

  .section-label {
    font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--blue-mid); margin-bottom: 0.75rem;
  }
  h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    color: var(--navy); line-height: 1.2; letter-spacing: -0.025em;
    margin-bottom: 1rem;
  }
  .section-intro { font-size: 1.05rem; color: var(--muted); max-width: 600px; margin-bottom: 3rem; }

  .problem { background: var(--white); }
  .problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  @media(max-width:640px){ .problem-grid { grid-template-columns: 1fr; } }
  .problem-card {
    background: var(--cream); border: 1px solid var(--border);
    border-radius: var(--r); padding: 1.75rem;
  }
  .problem-card .num {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem; font-weight: 600; color: var(--blue);
    line-height: 1; margin-bottom: 0.5rem;
  }
  .problem-card h3 { font-size: 1rem; font-weight: 500; color: var(--navy); margin-bottom: 0.5rem; }
  .problem-card p { font-size: 0.9rem; color: var(--muted); }

  .how { background: var(--ice); }
  .steps { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
  @media(max-width:640px){ .steps { grid-template-columns: 1fr; } }
  .step {
    background: var(--white); border-radius: var(--r);
    padding: 1.75rem; border: 1px solid var(--border);
  }
  .step-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--navy); color: var(--white);
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1rem;
  }
  .step h3 { font-size: 1rem; font-weight: 500; color: var(--navy); margin-bottom: 0.5rem; }
  .step p { font-size: 0.9rem; color: var(--muted); }

  .features { background: var(--white); }
  .features-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
  @media(max-width:640px){ .features-grid { grid-template-columns: 1fr; } }
  .feature-card {
    border-radius: var(--r); padding: 1.75rem;
    border: 1px solid var(--border);
  }
  .feature-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; margin-bottom: 1rem;
  }
  .feature-card h3 { font-size: 1rem; font-weight: 500; color: var(--navy); margin-bottom: 0.5rem; }
  .feature-card p { font-size: 0.9rem; color: var(--muted); }

  .pricing { background: var(--navy); }
  .pricing h2, .pricing .section-label { color: var(--white); }
  .pricing .section-intro { color: rgba(255,255,255,0.6); }
  .pricing-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
  @media(max-width:640px){ .pricing-grid { grid-template-columns: 1fr; } }
  .pricing-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--r); padding: 2rem;
  }
  .pricing-card.featured {
    background: rgba(74,159,212,0.15);
    border-color: var(--sky);
  }
  .pricing-card h3 { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; }
  .pricing-card .price {
